<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
  <script src="i18n.js"></script>
</head>
<body>
  <div class="container">
    <header class="header">
      <span class="header-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
      </span>
      <span class="header-title">PaperOneStep</span>
    </header>

    <div id="loading" class="loading">
      <svg class="spinner" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
      <span data-i18n="extExtracting">Extracting metadata...</span>
    </div>

    <div id="error" class="error hidden"></div>

    <div id="form" class="form hidden">
      <div class="field">
        <label data-i18n="extTitle">Title</label>
        <div class="value readonly" id="title"></div>
      </div>

      <div class="field">
        <label data-i18n="extAuthors">Authors</label>
        <div class="value readonly" id="authors"></div>
      </div>

      <div class="field-row">
        <div class="field flex-year">
          <label data-i18n="extYear">Year</label>
          <input type="text" id="year" class="input">
        </div>
        <div class="field flex-venue">
          <label data-i18n="extVenue">Venue</label>
          <input type="text" id="venue" class="input">
        </div>
      </div>
      <div id="timelineHint" style="font-size: 11px; color: var(--text-muted); margin-top: -8px; margin-bottom: 8px;" class="hidden"></div>

      <div class="field">
        <label data-i18n="extTags">Tags</label>
        <div class="tags-container" id="tagsContainer"></div>
        <div class="tag-input-row">
          <input type="text" id="tagInput" list="tagSuggestions" class="input" data-i18n-placeholder="extTagPlaceholder" placeholder="Type tag and press Enter...">
          <datalist id="tagSuggestions"></datalist>
        </div>
      </div>

      <div class="field">
        <button class="collapse-trigger" id="abstractToggle">
          <svg class="chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
          <span data-i18n="extAbstract">Abstract</span>
        </button>
        <div class="collapse-content hidden" id="abstractContent"></div>
      </div>

      <div class="field checkbox-field">
        <label>
          <input type="checkbox" id="inlineTagsCheckbox" checked>
          <span data-i18n="extAppendTags">Append #tags at bottom</span>
        </label>
      </div>

      <div class="field">
        <label data-i18n="extSavePath">Save Path</label>
        <div class="path-card" id="pathCard">
          <div class="path-dir" id="pathDir"></div>
          <div class="path-files" id="pathFiles"></div>
        </div>
      </div>

      <div class="button-row">
        <button id="saveBtn" class="btn btn-primary" data-i18n="extSaveClose">Save &amp; Close</button>
        <button id="cancelBtn" class="btn btn-secondary" data-i18n="extCancel">Cancel</button>
      </div>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
